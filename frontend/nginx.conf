server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Single-page app: fall back to index.html so client-side routes
    # (/dashboard, /folders/:id, /notes/:id, …) resolve on hard refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache fingerprinted assets aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
